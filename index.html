    <header class="header">
        <div class="logo"><img src="../images/logo.png" alt="နွားမကြီး Logo"></div>
        <a href="cart.html" class="cart-icon">

        </a>
    </header>

    <main>
        <div class="hero-section">
            <div class="slider-track" id="sliderTrack">
                <div class="slide">
                   <img src="/images/landscapecake.jpg" alt=""> 
                </div>
                <div class="slide">
                    <img src="/images/cake1.jpg" alt=""> 
                </div>
                <div class="slide">
                    <img src="/images/cake2.jpg" alt=""> 
                </div>
            </div>
        </div>

        <div class="sticky-search-menu">
            
            <section class="search-section">
                <div class="search-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                        <path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
                    </svg>
                    <input type="text" class="search-bar" placeholder="မုန့်များရှာဖွေရန်...">
                </div>
            </section>

            <section class="category-menu" id="categoryMenu"></section>
            
        </div>
        
        <div id="dynamicProductSections"></div>

    </main>

    <footer class="footer">
        <p class="footer-desc">နွားမကြီး Bakery မှ နွေးထွေးစွာ ကြိုဆိုပါတယ်။ လတ်ဆတ်သော မုန့်များကို နေ့စဉ် ဖုတ်လုပ်ပေးနေပါသည်။</p>
        <div class="social-links">
            <a href="#">Facebook</a>
            <a href="#">TikTok</a>
        </div>
        <div class="quick-links">
            <a href="#">About Us</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
        </div>
        <div class="contact-info">
            <p>📍 လိပ်စာ - အမှတ်(၁)၊ နွားမကြီးလမ်း၊ မန္တလေး။</p>
            <p>📞 ဖုန်း - 09 123456789</p>
